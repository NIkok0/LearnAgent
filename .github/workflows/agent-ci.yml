name: LearnAgent CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: learnagent-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "pydantic-settings>=2.2.0" \
            "langgraph>=0.2.40,<0.3.0" \
            "langgraph-checkpoint-sqlite>=2.0.0,<3.0.0" \
            "langchain-core>=0.3.0,<0.4.0"

      - name: Verify Phase 3 checkpoint
        run: python scripts/verify_phase3_checkpoint.py

      - name: Verify Phase 3 safety gate
        run: python scripts/verify_phase3_safety_gate.py

      - name: Verify Phase 4 dataset
        run: python scripts/verify_phase4_dataset.py

      - name: Verify Phase 4 RAG proxy
        run: python scripts/verify_phase4_ragas.py --mode proxy --disable-vector
