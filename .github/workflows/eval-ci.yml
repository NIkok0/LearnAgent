name: LearnAgent CI

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      run_full:
        description: "Run full profile (core + rag + e2e)"
        required: false
        type: boolean
        default: true
      enable_ragas:
        description: "Try RAGAS in auto mode"
        required: false
        type: boolean
        default: false

concurrency:
  group: learnagent-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval_core:
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run eval core profile
        run: python scripts/verify_eval_suite.py --profile core

      - name: Run eval rag profile
        run: python scripts/verify_eval_suite.py --profile rag --summary-json artifacts/eval/eval-rag-summary.json

      - name: Run live LLM E2E acceptance
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python scripts/verify_live_llm_e2e_acceptance.py --require-live --message "hello agent"
          else
            python scripts/verify_live_llm_e2e_acceptance.py --message "hello agent"
          fi

      - name: Build eval job summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def load(path: Path) -> dict:
              if not path.is_file():
                  return {}
              return json.loads(path.read_text(encoding="utf-8"))

          core = load(Path("artifacts/eval/eval-suite-summary.json"))
          rag = load(Path("artifacts/eval/eval-rag-summary.json"))
          live = load(Path("artifacts/runtime/live-llm-e2e-acceptance-summary.json"))
          overall = bool(core.get("overall_pass", False) and rag.get("overall_pass", False))
          live_status = live.get("status", "MISSING")
          if live_status == "FAIL":
              overall = False
          lines = [
              "## LearnAgent CI Summary",
              f"- overall_pass: {overall}",
              "",
              "### core",
              f"- overall_pass: {core.get('overall_pass')}",
              f"- suites_total: {core.get('suites_total')}",
              f"- suites_failed: {core.get('suites_failed')}",
              f"- failed_suites: {', '.join(core.get('failed_suites', [])) or '(none)'}",
              f"- contract_schema_ok: {core.get('contract_schema_ok')}",
              "",
              "### rag",
              f"- overall_pass: {rag.get('overall_pass')}",
              f"- suites_total: {rag.get('suites_total')}",
              f"- suites_failed: {rag.get('suites_failed')}",
              f"- failed_suites: {', '.join(rag.get('failed_suites', [])) or '(none)'}",
              f"- skipped_suites: {', '.join(rag.get('skipped_suites', [])) or '(none)'}",
              "",
              "### live_llm_e2e_acceptance",
              f"- status: {live_status}",
              f"- provider: {live.get('provider')}",
              f"- model: {live.get('model')}",
              f"- base_url: {live.get('base_url')}",
              f"- reason: {live.get('reason', '')}",
          ]
          summary_file = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          if not overall:
              raise SystemExit(1)
          PY

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-pr-artifacts
          path: |
            artifacts/eval/eval-suite-summary.json
            artifacts/eval/eval-rag-summary.json
            artifacts/runtime/live-llm-e2e-acceptance-summary.json
          if-no-files-found: warn

  eval_full_nightly:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_full == true) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-vector.txt

      - name: Run eval full profile
        env:
          RAG_USE_VECTOR: "true"
          RAG_RERANK_ENABLED: "true"
          RAG_EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/verify_eval_suite.py --profile full --enable-ragas
          elif [ "${{ inputs.enable_ragas }}" = "true" ]; then
            python scripts/verify_eval_suite.py --profile full --enable-ragas
          else
            python scripts/verify_eval_suite.py --profile full
          fi

      - name: Build nightly summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("artifacts/eval/eval-suite-summary.json")
          if not p.exists():
              print("No eval summary found.")
              raise SystemExit(0)
          payload = json.loads(p.read_text(encoding="utf-8"))
          failed = payload.get("failed_suites", [])
          rag_metrics = payload.get("rag_metrics", {})
          nightly_metrics_path = Path("artifacts/eval/rag_metrics/nightly-latest.json")
          nightly_payload = {}
          if nightly_metrics_path.is_file():
              nightly_payload = json.loads(nightly_metrics_path.read_text(encoding="utf-8"))
          lines = [
              "## Eval Full Summary",
              f"- overall_pass: {payload.get('overall_pass')}",
              f"- suites_total: {payload.get('suites_total')}",
              f"- suites_failed: {payload.get('suites_failed')}",
              f"- skipped_suites: {', '.join(payload.get('skipped_suites', [])) or '(none)'}",
              f"- failed_suites: {', '.join(failed) if failed else '(none)'}",
              f"- failed_scenarios: {', '.join(payload.get('failed_scenarios', [])) or '(none)'}",
              f"- runtime_contract_breaks: {', '.join(payload.get('runtime_contract_breaks', [])) or '(none)'}",
              f"- contract_schema_ok: {payload.get('contract_schema_ok')}",
              f"- rag_metrics: {json.dumps(rag_metrics, ensure_ascii=False)}",
              f"- nightly_embedding_model: {nightly_payload.get('embedding_model', 'n/a')}",
              f"- nightly_vector_enabled: {nightly_payload.get('vector_enabled')}",
              f"- nightly_rerank_enabled: {nightly_payload.get('rerank_enabled')}",
          ]
          summary_file = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload full eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-full-artifacts
          path: |
            artifacts/eval/eval-suite-summary.json
            artifacts/eval/rag_metrics/
            artifacts/runtime/*.json
            artifacts/phase4/*.json
          if-no-files-found: warn
